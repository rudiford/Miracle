<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Test - Proof of a Miracle</title>
<style>
body { 
  font-family: Arial; 
  text-align: center; 
  padding: 20px; 
  background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%); 
  color: white; 
  min-height: 100vh; 
  margin: 0; 
}
.cross { font-size: 80px; margin: 20px 0; color: #f59e0b; }
h1 { font-size: 1.8rem; margin: 20px 0; }
.btn { 
  display: block; 
  width: 90%; 
  margin: 15px auto; 
  padding: 18px; 
  background: #f59e0b; 
  color: white; 
  text-decoration: none; 
  border-radius: 12px; 
  font-size: 1.1rem; 
  font-weight: bold; 
  border: none;
  cursor: pointer;
}
.status { 
  background: #059669; 
  padding: 15px; 
  border-radius: 8px; 
  margin: 20px 0; 
  font-weight: bold;
}
.test { 
  background: #dc2626; 
  padding: 10px; 
  border-radius: 6px; 
  margin: 15px 0; 
  font-size: 0.9rem;
}
</style>
</head>
<body>
<div class="cross">✞</div>
<h1>Proof of a Miracle</h1>
<p class="status">MOBILE TEST PAGE</p>
<p>Faith Community - Direct Mobile Access</p>

<button class="btn" onclick="testConnection()">Test Server Connection</button>
<a href="http://localhost:5000/" class="btn">Go to Main App</a>
<a href="http://localhost:5000/api/login" class="btn">Direct Authentication</a>

<div id="result" class="test">Ready to test...</div>

<script>
function testConnection() {
  const result = document.getElementById('result');
  result.innerHTML = 'Testing connection...';
  
  fetch('http://localhost:5000/')
    .then(response => {
      if (response.ok) {
        result.innerHTML = '✅ SUCCESS: Mobile server connection working!';
        result.style.background = '#059669';
      } else {
        result.innerHTML = '❌ ERROR: Server returned ' + response.status;
        result.style.background = '#dc2626';
      }
    })
    .catch(error => {
      result.innerHTML = '❌ FAILED: Cannot connect to server - ' + error.message;
      result.style.background = '#dc2626';
    });
}

// Auto-test on page load
setTimeout(testConnection, 1000);

console.log('Mobile test page loaded');
console.log('User agent:', navigator.userAgent);
console.log('Screen size:', screen.width + 'x' + screen.height);
</script>
</body>
</html>
