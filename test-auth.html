<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth Test - Proof of a Miracle</title>
<style>
body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
  color: white;
  text-align: center;
  padding: 40px 20px;
  min-height: 100vh;
  margin: 0;
}
.container {
  max-width: 400px;
  margin: 0 auto;
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 15px;
}
.cross { font-size: 80px; color: #f59e0b; margin: 20px 0; }
.btn {
  display: block;
  background: #f59e0b;
  color: white;
  padding: 18px;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  margin: 15px 0;
  font-size: 1.1rem;
}
.btn:hover { background: #d97706; }
.status {
  background: #059669;
  padding: 15px;
  border-radius: 10px;
  margin: 20px 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="container">
  <div class="cross">✞</div>
  <h1>Authentication Test</h1>
  <div class="status">DIRECT AUTH LINKS</div>
  
  <a href="https://proofofamiracle.com/api/auth/login" class="btn">
    🔗 Direct Auth Link
  </a>
  
  <a href="javascript:void(0)" onclick="testAuth()" class="btn">
    🧪 Test Authentication
  </a>
  
  <div id="result" style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 8px;"></div>
</div>

<script>
async function testAuth() {
  const result = document.getElementById('result');
  result.innerHTML = 'Testing authentication...';
  
  try {
    const response = await fetch('https://proofofamiracle.com/api/auth/login', {
      method: 'GET',
      redirect: 'manual'
    });
    
    if (response.status === 0 || response.type === 'opaqueredirect') {
      result.innerHTML = '✅ Authentication redirect working!<br>Status: Redirect to Replit';
    } else if (response.status === 302) {
      result.innerHTML = '✅ Authentication working!<br>Status: ' + response.status;
    } else {
      result.innerHTML = '⚠️ Unexpected response<br>Status: ' + response.status;
    }
  } catch (error) {
    result.innerHTML = '❌ Error: ' + error.message;
  }
}

// Auto-test on load
setTimeout(testAuth, 1000);
</script>
</body>
</html>
