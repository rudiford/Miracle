<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of a Miracle</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, #1e3a8a, #1e40af);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .cross {
            width: 100px;
            height: 100px;
            background: black;
            margin: 0 auto 20px;
            position: relative;
        }
        .cross::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 40px;
            width: 20px;
            height: 60px;
            background: white;
        }
        .cross::after {
            content: '';
            position: absolute;
            top: 40px;
            left: 20px;
            width: 60px;
            height: 20px;
            background: white;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .button {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #f59e0b;
            color: #1e40af;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .button:hover {
            background: #eab308;
        }
    </style>
</head>
<body>
    <div class="cross"></div>
    <h1>Proof of a Miracle</h1>
    <p>Share your faith experiences and connect with believers worldwide</p>
    <a href="/api/login" class="button">🇺🇸 Log In</a>
    <a href="/api/login" class="button">🇪🇸 Iniciar Sesión</a>
    <script>
        // Redirect to main app if JavaScript is working
        setTimeout(() => {
            window.location.href = '/';
        }, 100);
    </script>
</body>
</html>
