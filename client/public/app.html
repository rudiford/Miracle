<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Proof of a Miracle - Faith Community App</title>
    <meta name="description" content="Discovering miracles and faith experiences around the world. Join our Christian community to share testimonies, connect with believers, and explore faith through interactive features." />
    
    <!-- Open Graph tags -->
    <meta property="og:title" content="Proof of a Miracle - Faith Community App" />
    <meta property="og:description" content="Discovering miracles and faith experiences around the world. Join our Christian community to share testimonies and connect with fellow believers." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/api/og-image" />
    
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="pinterest" content="nopin" />
    <meta name="pinterest-rich-pin" content="false" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/cross.png" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom CSS variables for the app */
      :root {
        --background: hsl(0, 0%, 100%);
        --foreground: hsl(222, 84%, 4.9%);
        --primary: hsl(217, 91%, 59%);
        --primary-foreground: hsl(0, 0%, 98%);
        --faith-blue: hsl(221, 83%, 53%);
        --faith-gold: hsl(43, 96%, 56%);
      }
      
      body {
        font-family: 'Inter', sans-serif;
        background: var(--background);
        color: var(--foreground);
      }
      
      .faith-gradient {
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      }
      
      .loading-spinner {
        border: 4px solid #f3f4f6;
        border-top: 4px solid var(--faith-blue);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen -->
      <div class="min-h-screen faith-gradient flex items-center justify-center">
        <div class="text-center text-white">
          <div class="mb-4">
            <img src="/cross.png" alt="Cross" class="w-16 h-16 mx-auto mb-4">
          </div>
          <h1 class="text-3xl font-bold mb-2">Proof of a Miracle</h1>
          <p class="text-lg mb-6 opacity-90">Loading faith community...</p>
          <div class="loading-spinner mx-auto"></div>
        </div>
      </div>
    </div>
    
    <!-- Load React and dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
      // Simple redirect to the main app with runtime error plugin disabled
      console.log('Redirecting to main app...');
      
      // Add a flag to indicate we want to bypass the runtime error plugin
      sessionStorage.setItem('bypass-runtime-error', 'true');
      
      // Redirect to main app after short delay
      setTimeout(() => {
        window.location.href = '/?no-error-plugin=true';
      }, 2000);
    </script>
  </body>
</html>
