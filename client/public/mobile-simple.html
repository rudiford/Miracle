<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of a Miracle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .app {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            color: #1e3a8a;
        }
        .cross { font-size: 3rem; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { margin-bottom: 20px; opacity: 0.8; }
        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary { background: #f59e0b; color: #1e3a8a; }
        .btn-secondary { background: #6b7280; color: white; }
        .btn:hover { transform: translateY(-1px); }
        .status { padding: 15px; margin: 15px 0; border-radius: 8px; font-size: 0.9rem; }
        .loading { background: #f3f4f6; color: #374151; }
        .error { background: #fee2e2; color: #dc2626; }
        .success { background: #d1fae5; color: #065f46; }
        .hidden { display: none; }
        .spinner {
            width: 20px; height: 20px; border: 2px solid #f3f4f6; border-top: 2px solid #1e3a8a;
            border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <div class="cross">✞</div>
        <h1>Proof of a Miracle</h1>
        <p>Faith Community</p>
        
        <div id="loading-section">
            <div class="status loading">
                <div class="spinner"></div>
                <p>Loading...</p>
            </div>
        </div>
        
        <div id="auth-section" class="hidden">
            <div id="login-section">
                <p style="margin-bottom: 15px;">Join our faith community</p>
                <button class="btn btn-primary" onclick="signIn()">Sign In with Replit</button>
            </div>
            
            <div id="user-section" class="hidden">
                <div class="status success">
                    Welcome, <span id="user-name">User</span>!
                </div>
                <button class="btn btn-primary" onclick="enterApp()">Enter Faith Community</button>
                <button class="btn btn-secondary" onclick="signOut()">Sign Out</button>
            </div>
        </div>
        
        <div id="main-section" class="hidden">
            <h2 style="margin-bottom: 20px;">Community Feed</h2>
            <button class="btn btn-primary" onclick="createPost()">Share Your Testimony</button>
            <div id="posts" style="margin-top: 20px; text-align: left;">
                <div class="status loading">
                    <div class="spinner"></div>
                    <p>Loading posts...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        console.log('Simple mobile version loaded');
        
        let currentUser = null;
        
        function show(elementId) {
            document.getElementById(elementId).classList.remove('hidden');
        }
        
        function hide(elementId) {
            document.getElementById(elementId).classList.add('hidden');
        }
        
        function showStatus(message, type = 'loading') {
            const statusDiv = document.createElement('div');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = type === 'loading' ? `<div class="spinner"></div><p>${message}</p>` : `<p>${message}</p>`;
            return statusDiv;
        }
        
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/user', { credentials: 'include' });
                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('user-name').textContent = currentUser.firstName || 'User';
                    hide('login-section');
                    show('user-section');
                } else {
                    show('login-section');
                    hide('user-section');
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                show('login-section');
                hide('user-section');
            } finally {
                hide('loading-section');
                show('auth-section');
            }
        }
        
        function signIn() {
            window.location.href = '/api/auth/login';
        }
        
        function signOut() {
            window.location.href = '/api/auth/logout';
        }
        
        function enterApp() {
            hide('auth-section');
            show('main-section');
            loadPosts();
        }
        
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts', { credentials: 'include' });
                if (response.ok) {
                    const posts = await response.json();
                    displayPosts(posts);
                } else {
                    document.getElementById('posts').innerHTML = '<div class="status error"><p>Unable to load posts</p></div>';
                }
            } catch (error) {
                console.error('Error loading posts:', error);
                document.getElementById('posts').innerHTML = '<div class="status error"><p>Error loading posts</p></div>';
            }
        }
        
        function displayPosts(posts) {
            const postsDiv = document.getElementById('posts');
            if (posts.length === 0) {
                postsDiv.innerHTML = '<div class="status"><p>No posts yet. Be the first to share!</p></div>';
                return;
            }
            
            postsDiv.innerHTML = posts.map(post => `
                <div style="background: #f9fafb; padding: 15px; margin: 10px 0; border-radius: 8px; color: #374151;">
                    <div style="font-weight: bold; margin-bottom: 5px;">${post.user.firstName} ${post.user.lastName}</div>
                    <p style="margin-bottom: 10px;">${post.content}</p>
                    <div style="display: flex; gap: 15px; font-size: 0.9rem; color: #6b7280;">
                        <button onclick="togglePrayer(${post.id})" style="background: none; border: none; color: #6b7280; cursor: pointer;">
                            🙏 ${post.prayerCount || 0}
                        </button>
                        <button onclick="toggleLove(${post.id})" style="background: none; border: none; color: #6b7280; cursor: pointer;">
                            ❤️ ${post.loveCount || 0}
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function createPost() {
            const content = prompt('Share your testimony:');
            if (content) {
                fetch('/api/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ content })
                }).then(response => {
                    if (response.ok) {
                        loadPosts();
                    } else {
                        alert('Failed to create post');
                    }
                }).catch(error => {
                    console.error('Error creating post:', error);
                    alert('Failed to create post');
                });
            }
        }
        
        async function togglePrayer(postId) {
            try {
                await fetch(`/api/posts/${postId}/prayer`, { method: 'POST', credentials: 'include' });
                loadPosts();
            } catch (error) {
                console.error('Error toggling prayer:', error);
            }
        }
        
        async function toggleLove(postId) {
            try {
                await fetch(`/api/posts/${postId}/love`, { method: 'POST', credentials: 'include' });
                loadPosts();
            } catch (error) {
                console.error('Error toggling love:', error);
            }
        }
        
        // Initialize
        checkAuth();
    </script>
</body>
</html>
