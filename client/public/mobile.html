<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Proof of a Miracle - Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            color: #1e3a8a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin: 0 auto;
            position: relative;
        }
        
        .cross {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #1e3a8a;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        p {
            margin-bottom: 25px;
            color: #4b5563;
            line-height: 1.5;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        
        .btn-primary {
            background: #f59e0b;
            color: #1e3a8a;
        }
        
        .btn-primary:hover {
            background: #d97706;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .loading {
            display: none;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
        
        .message {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #374151;
        }
        
        .error {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .success {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cross">✞</div>
        <h1>Proof of a Miracle</h1>
        <p>Faith Community</p>
        <div style="font-size: 0.8rem; color: #6b7280; margin-bottom: 15px;">
            Mobile-Optimized Version
        </div>
        
        <div id="loading" class="loading">
            <div style="width: 30px; height: 30px; border: 3px solid #f3f4f6; border-top: 3px solid #1e3a8a; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto;"></div>
            <p>Loading...</p>
        </div>
        
        <div id="auth-section">
            <div class="message" id="status-message">
                Checking authentication...
            </div>
            
            <div id="login-buttons" class="hidden">
                <button class="btn btn-primary" onclick="signIn()">
                    Sign In with Replit
                </button>
                <button class="btn btn-secondary" onclick="openFullApp()">
                    Try Full App
                </button>
            </div>
            
            <div id="user-info" class="hidden">
                <div class="message success">
                    Welcome back, <span id="user-name"></span>!
                </div>
                <button class="btn btn-primary" onclick="openFullApp()">
                    Enter Faith Community
                </button>
                <button class="btn btn-secondary" onclick="signOut()">
                    Sign Out
                </button>
            </div>
        </div>
    </div>

    <script>
        console.log('Mobile-friendly version loaded');
        console.log('User agent:', navigator.userAgent);
        
        let currentUser = null;
        
        function showMessage(text, type = 'info') {
            const messageEl = document.getElementById('status-message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }
        
        function showLoading(show = true) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        async function checkAuth() {
            try {
                showLoading(true);
                showMessage('Checking authentication...');
                
                const response = await fetch('/api/auth/user', { 
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' }
                });
                
                showLoading(false);
                
                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('user-name').textContent = `${currentUser.firstName} ${currentUser.lastName}`;
                    document.getElementById('login-buttons').classList.add('hidden');
                    document.getElementById('user-info').classList.remove('hidden');
                    showMessage('Authentication successful!', 'success');
                } else {
                    document.getElementById('login-buttons').classList.remove('hidden');
                    document.getElementById('user-info').classList.add('hidden');
                    showMessage('Please sign in to continue', 'info');
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                showLoading(false);
                document.getElementById('login-buttons').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                showMessage('Connection error. Please try again.', 'error');
            }
        }
        
        function signIn() {
            showMessage('Redirecting to sign in...', 'info');
            window.location.href = '/api/auth/login';
        }
        
        function signOut() {
            showMessage('Signing out...', 'info');
            window.location.href = '/api/auth/logout';
        }
        
        function openFullApp() {
            showMessage('Loading full app...', 'info');
            window.location.href = '/';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
        });
        
        // Fallback initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkAuth);
        } else {
            checkAuth();
        }
    </script>
</body>
</html>
