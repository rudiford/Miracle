<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proof of a Miracle - Test Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 500px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .button {
      background: white;
      color: #1e3a8a;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      display: inline-block;
      margin: 0 0.5rem;
    }
    .button:hover {
      background: #f0f0f0;
    }
    .status {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 0.5rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>✝️ Proof of a Miracle</h1>
    <p>Faith Community App - Test Page</p>
    <p>This is a simple test page to verify that the preview window is working correctly without the runtime error plugin interference.</p>
    
    <div>
      <a href="/" class="button">Go to Main App</a>
      <button onclick="testAPI()" class="button">Test API</button>
    </div>
    
    <div class="status" id="status">
      Status: Test page loaded successfully ✅
    </div>
  </div>

  <script>
    function testAPI() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Testing API connection...';
      
      fetch('/api/auth/user')
        .then(response => {
          if (response.status === 401) {
            statusEl.textContent = 'API Test: ✅ Server responding correctly (401 Unauthorized - normal for logged out users)';
          } else if (response.ok) {
            statusEl.textContent = 'API Test: ✅ Server responding correctly (User authenticated)';
          } else {
            statusEl.textContent = 'API Test: ⚠️ Server responded with status ' + response.status;
          }
        })
        .catch(error => {
          statusEl.textContent = 'API Test: ❌ Error - ' + error.message;
        });
    }
    
    // Test basic JavaScript functionality
    console.log('Test page loaded successfully');
    console.log('Browser:', navigator.userAgent);
    console.log('Preview window compatible: Yes');
  </script>
</body>
</html>
