<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Proof of a Miracle</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 300px;
        }
        .cross { font-size: 3rem; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { margin-bottom: 20px; opacity: 0.9; }
        .loading { 
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(255,255,255,0.3); 
            border-top: 4px solid white; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 20px auto;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="cross">✞</div>
        <h1>Proof of a Miracle</h1>
        <p>Optimizing for your mobile browser...</p>
        <div class="loading"></div>
    </div>
    
    <script>
        console.log('Mobile redirect page loaded');
        console.log('User agent:', navigator.userAgent);
        
        // Immediately redirect to mobile version
        setTimeout(() => {
            window.location.href = '/mobile.html';
        }, 1000);
    </script>
</body>
</html>
